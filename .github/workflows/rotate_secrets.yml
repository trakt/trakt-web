name: The Vault Rotation (Rotate Secrets)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    name: Updating the Sacred Scrolls (Sync Secrets to Cloudflare)
    runs-on: ubuntu-latest

    steps:
      - name: Secure the Evidence aka Checkout Code
        uses: actions/checkout@v4

      - name: Pushing the Sacred Scrolls to the Vault aka Sync Secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/client
          secrets: |
            TRAKT_CLIENT_ID
            TRAKT_CLIENT_SECRET
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
