name: Weekly User-Agent Block Test

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  test-ua:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- BLOCKED: Chrome regex r"Chrome/([1-9][0-9]|1[0-3][0-9])\\." ---
          - name: "Chrome 90 (Lower Match Boundary)"
            ua: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/90.0.4430.212 Safari/537.36"
            expected: 403
          - name: "Chrome 139 (Upper Match Boundary)"
            ua: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36"
            expected: 403

          # --- BLOCKED: Firefox regex r"Firefox/([1-9][0-9]|1[0-2][0-9]|130)\\." ---
          - name: "Firefox 90 (Lower Match Boundary)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14.0; rv:90.0) Gecko/20100101 Firefox/90.0"
            expected: 403
          - name: "Firefox 130 (Upper Match Boundary)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14.0; rv:130.0) Gecko/20100101 Firefox/130.0"
            expected: 403

          # --- BLOCKED: Safari regex r"Version/([1-9]|1[0-7])\\..*Safari/" ---
          - name: "Safari 1 (Lower Match Boundary)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/1.0 Safari/605.1.15"
            expected: 403
          - name: "Safari 17 (Upper Match Boundary)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.6 Safari/605.1.15"
            expected: 403

          # --- BLOCKED: Explicit contains checks (MSIE / Trident) ---
          - name: "MSIE Token Present"
            ua: "Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.1; Trident/6.0)"
            expected: 403
          - name: "Trident Token Present"
            ua: "Mozilla/5.0 (Windows NT 6.3; Trident/7.0; rv:11.0) like Gecko"
            expected: 403

          # --- ALLOWED: Outside blocked regex ranges on app host ---
          - name: "Chrome 140 (Outside Match Range)"
            ua: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/140.0.0.0 Safari/537.36"
            expected: 200
          - name: "Firefox 131 (Outside Match Range)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14.0; rv:131.0) Gecko/20100101 Firefox/131.0"
            expected: 200
          - name: "Safari 18 (Outside Match Range)"
            ua: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Safari/605.1.15"
            expected: 200

          # --- ALLOWED: Native Apps ---
          - name: "Trakt iOS App"
            ua: "Trakt/2.4.1 (iPhone; iOS 19.0.1; Scale/3.00)"
            expected: 200

    name: Test ${{ matrix.name }}
    steps:
      - name: Perform Request
        run: |
          STATUS=$(curl -o /dev/null -s -L -w "%{http_code}" -A "${{ matrix.ua }}" https://app.trakt.tv/)
          echo "User Agent: ${{ matrix.ua }}"
          echo "Received Status: $STATUS"
          
          if [ "${{ matrix.expected }}" == "403" ]; then
            if [ "$STATUS" -eq 403 ] || [ "$STATUS" -eq 1010 ]; then
              echo "✅ Correctly Blocked"
            else
              echo "❌ ERROR: Should have been blocked"; exit 1
            fi
          else
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
              echo "✅ Correctly Allowed"
            else
              echo "❌ ERROR: Should have been allowed"; exit 1
            fi
          fi
